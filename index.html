<!DOCTYPE html>
<html>
<head>
  <title>GUIZIN</title>

  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 40px;
      color: #38bdf8;
    }

    p {
      font-size: 18px;
      color: #cbd5f5;
    }

    button {
      background-color: #38bdf8;
      color: black;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0ea5e9;
    }
  </style>

</head>

<body>

  <h1>O que sei fazer?</h1>
  <p>Clique para saber mais</p>

  <button>Clica aqui</button>
  
</body>
</html>

<button onclick="clicou()">Clica aqui</button>

<script>
  function clicou() {
    alert("Você clicou no botão 😎");
  }
</script>

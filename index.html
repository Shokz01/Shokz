<!DOCTYPE html>
<html>
<head>
  <title>GUIZIN</title>

  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 50px;
      color: #38bdf8;
    }

    p {
      font-size: 20px;
      color: #cbd5f5;
    }

    button {
      background-color: #38bdf8;
      color: black;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }

    button:hover {
      background-color: #0ea5e9;
    }
  </style>

</head>

<body>

  <h1>GUIZIN</h1>
  <p>O que sei fazer?</p>

  <button onclick="mostrar()">Clica aqui para saber</button>

  <p id="resposta"></p>

  <script>
    function mostrar() {
      document.getElementById("resposta").innerText = "Só sei que nada sei";
    }
  </script>

</body>
</html>
